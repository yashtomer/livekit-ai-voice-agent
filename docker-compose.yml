# ════════════════════════════════════════════════════════════════════
# Single-command startup for the entire voice-agent stack.
#
#   docker compose up -d           # start everything
#   docker compose logs -f agent   # tail any one service
#   docker compose down            # stop everything (volumes preserved)
#
# What comes up:
#   - livekit-server       (:7880)  — WebRTC media server, dev mode
#   - whisper-*            (:8100-8104) — 5 Whisper flavors for STT
#   - tts (Piper)          (:8200)  — free local English TTS
#   - voicebox             (:17493) — Voicebox TTS (Kokoro + others, voice cloning)
#   - token-server         (:8000)  — FastAPI + static web UI (MAIN ENTRY POINT)
#   - agent                          — LiveKit worker, no exposed port
#
# Ollama stays on the HOST — bundling it would double-download your existing
# models. The containers reach it at host.docker.internal:11434.
# If you prefer Ollama in Docker too, uncomment the `ollama` service.
# ════════════════════════════════════════════════════════════════════

services:

  # ─── LiveKit WebRTC media server ───
  # --dev enables built-in devkey/secret creds + permissive CORS. For prod,
  # run without --dev and mount livekit.yaml with real keys.
  livekit-server:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0 --node-ip 127.0.0.1
    ports:
      - "7880:7880"    # Signaling + HTTP API (browser WS connection)
      - "7881:7881"    # WebRTC TCP fallback
      - "7882:7882/udp" # WebRTC UDP (main media path)
    restart: unless-stopped

  # ─── Whisper STT containers ───
  # Five sizes: tiny/base/small (English-only .en) + base-multi/small-multi
  # (99 languages). All use CTranslate2 int8 for CPU speed.
  #
  # OMP_NUM_THREADS=8 matches threads to cores. Without it CTranslate2 uses
  # min(4, cores/2) by default which leaves a 16-core box at ~25% utilization.
  # int8 gives a 2-4× speedup over the float32 CPU fallback.
  whisper-base:
    image: fedirz/faster-whisper-server:latest-cpu
    ports: ["8100:8000"]
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-base.en
      - WHISPER__COMPUTE_TYPE=int8
      - WHISPER__DEFAULT_LANGUAGE=en
      - OMP_NUM_THREADS=4
    restart: unless-stopped

  whisper-small:
    image: fedirz/faster-whisper-server:latest-cpu
    ports: ["8101:8000"]
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-small.en
      - WHISPER__COMPUTE_TYPE=int8
      - WHISPER__DEFAULT_LANGUAGE=en
      - OMP_NUM_THREADS=4
    restart: unless-stopped

  whisper-tiny:
    image: fedirz/faster-whisper-server:latest-cpu
    ports: ["8102:8000"]
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-tiny.en
      - WHISPER__COMPUTE_TYPE=int8
      - WHISPER__DEFAULT_LANGUAGE=en
      - OMP_NUM_THREADS=4
    restart: unless-stopped

  whisper-base-multi:
    image: fedirz/faster-whisper-server:latest-cpu
    ports: ["8103:8000"]
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-base
      - WHISPER__COMPUTE_TYPE=int8
      - OMP_NUM_THREADS=4
    restart: unless-stopped

  whisper-small-multi:
    image: fedirz/faster-whisper-server:latest-cpu
    ports: ["8104:8000"]
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-small
      - WHISPER__COMPUTE_TYPE=int8
      - OMP_NUM_THREADS=4
    restart: unless-stopped

  # ─── Piper (openedai-speech) — fallback English TTS ───
  tts:
    image: ghcr.io/matatonic/openedai-speech:latest
    ports: ["8200:8000"]
    volumes:
      - tts-voices:/app/voices
    restart: unless-stopped

  # ─── Voicebox — local ElevenLabs alternative ───
  # Built from ./voicebox/Dockerfile. Kokoro 82M is bundled on first start
  # (~313 MB) and voices appear in the TTS dropdown. Voice cloning works via
  # the Tauri desktop app (not needed for this stack).
  voicebox:
    # Image is built from ./voicebox/Dockerfile on first `docker compose up`.
    # We pin the tag to `voicebox-voicebox:latest` — the same tag the
    # standalone ./voicebox/docker-compose.yml uses — so the image is
    # shared across both compose projects (saves re-downloading Kokoro
    # + 3 GB of pytorch deps). Remove the `image:` line to force a fresh
    # build under the root project's name.
    image: voicebox-voicebox:latest
    build: ./voicebox
    pull_policy: never
    container_name: voicebox
    ports:
      - "127.0.0.1:17493:17493"
    volumes:
      - ./voicebox/output:/app/data/generations
      - voicebox-data:/app/data
      - huggingface-cache:/home/voicebox/.cache/huggingface
    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      # CPU-inference thread tuning — must come from docker-compose (torch
      # reads these at import time). See voicebox/docker-compose.yml notes.
      # Value must be ≤ Docker Desktop's VM CPU count (Settings → Resources).
      # 6 leaves ~2 cores free for whisper/token-server/agent in the same VM.
      - OMP_NUM_THREADS=6
      - MKL_NUM_THREADS=6
      - NUMEXPR_NUM_THREADS=6
      - TOKENIZERS_PARALLELISM=false
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 6G
    restart: unless-stopped

  # ─── Token server + web UI (FastAPI) ───
  # This is the main entry point — users open http://localhost:8000 in
  # their browser. Serves static files from ./web/ and exposes /api/token,
  # /api/models, /api/tts-sample, /api/fx-rate.
  #
  # LIVEKIT_URL is the PUBLIC url we embed in the JWT returned to browsers.
  # Must point at the port-mapped livekit-server (localhost:7880), not the
  # docker-internal hostname — the browser can't resolve compose service
  # names.
  token-server:
    build: .
    image: livekit-ai-voice-agent:latest
    command: uv run uvicorn src.token_server:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    environment:
      - LIVEKIT_URL=ws://localhost:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret
      - VOICEBOX_URL=http://voicebox:17493
      - OLLAMA_URL=http://host.docker.internal:11434
      - PIPER_URL=http://tts:8000/v1
    env_file:
      - path: .env
        required: false
    depends_on:
      - livekit-server
      - voicebox
    # Lets the container reach Ollama on the host (Mac/Windows only —
    # on Linux hosts you'd use --network host or add the host IP manually).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── Agent worker (LiveKit dispatcher) ───
  # Joins each room the token server creates, builds the STT/LLM/TTS
  # pipeline from the browser-chosen config in participant metadata.
  # LIVEKIT_URL here uses the docker-internal hostname — the agent lives
  # in the same network and shouldn't round-trip through the host.
  agent:
    build: .
    image: livekit-ai-voice-agent:latest
    command: uv run python src/agent.py start
    environment:
      # LiveKit
      - LIVEKIT_URL=ws://livekit-server:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret
      # Internal service URLs (docker network)
      - OLLAMA_URL=http://host.docker.internal:11434
      - VOICEBOX_URL=http://voicebox:17493
      - TTS_BASE_URL=http://tts:8000/v1
      - WHISPER_TINY_URL=http://whisper-tiny:8000/v1
      - WHISPER_BASE_URL=http://whisper-base:8000/v1
      - WHISPER_SMALL_URL=http://whisper-small:8000/v1
      - WHISPER_BASE_MULTI_URL=http://whisper-base-multi:8000/v1
      - WHISPER_SMALL_MULTI_URL=http://whisper-small-multi:8000/v1
    env_file:
      - path: .env
        required: false
    depends_on:
      - livekit-server
      - whisper-base
      - whisper-small
      - whisper-base-multi
      - whisper-small-multi
      - tts
      - voicebox
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── Ollama (OPTIONAL — enable with `--profile ollama`) ───
  # Uncomment + use `docker compose --profile ollama up -d` to run Ollama
  # in Docker instead of on the host. Mounts your existing ~/.ollama dir
  # so models aren't re-downloaded.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   profiles: ["ollama"]
  #   ports: ["11434:11434"]
  #   volumes:
  #     - ~/.ollama:/root/.ollama
  #   restart: unless-stopped

volumes:
  tts-voices:
  voicebox-data:
  huggingface-cache:
