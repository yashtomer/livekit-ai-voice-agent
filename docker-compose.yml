# ════════════════════════════════════════════════════════════════════
# AI Voice Cost Calculator — Full stack
#
#   docker compose up -d           # start everything
#   docker compose logs -f backend # tail any service
#   docker compose down            # stop (volumes preserved)
#
# Database: uses the host's system-installed PostgreSQL (NOT a container).
# Set POSTGRES_HOST/PORT/USER/PASSWORD/DB in .env. Defaults connect to
# host.docker.internal:5432 with user `postgres` / password `password`.
#
# Services:
#   - livekit-server (:7880)    — WebRTC media server
#   - whisper-*      (:8100-8104) — Whisper STT variants
#   - tts (Piper)    (:8200)    — free local TTS
#   - voicebox       (:17493)   — local ElevenLabs alternative
#   - backend        (:8000)    — FastAPI backend (MAIN ENTRY POINT)
#   - frontend       (:3000)    — React/Vite UI
#   - agent                     — LiveKit worker
#
# All host-facing ports are env-configurable — see .env.example.
# ════════════════════════════════════════════════════════════════════

services:

  # ─── LiveKit WebRTC media server ───
  livekit-server:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml --node-ip 127.0.0.1
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "${LIVEKIT_PORT:-7880}:7880"
      - "${LIVEKIT_RTC_PORT:-7881}:7881"
      - "${LIVEKIT_UDP_PORT:-7882}:7882/udp"
    restart: unless-stopped

  # ─── Whisper STT containers ───
  whisper-base:
    image: fedirz/faster-whisper-server:latest-cpu
    ports: ["${WHISPER_BASE_PORT:-8100}:8000"]
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-base.en
      - WHISPER__COMPUTE_TYPE=int8
      - WHISPER__DEFAULT_LANGUAGE=en
      - OMP_NUM_THREADS=4
    restart: unless-stopped

  whisper-small:
    image: fedirz/faster-whisper-server:latest-cpu
    ports: ["${WHISPER_SMALL_PORT:-8101}:8000"]
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-small.en
      - WHISPER__COMPUTE_TYPE=int8
      - WHISPER__DEFAULT_LANGUAGE=en
      - OMP_NUM_THREADS=4
    restart: unless-stopped

  whisper-tiny:
    image: fedirz/faster-whisper-server:latest-cpu
    ports: ["${WHISPER_TINY_PORT:-8102}:8000"]
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-tiny.en
      - WHISPER__COMPUTE_TYPE=int8
      - WHISPER__DEFAULT_LANGUAGE=en
      - OMP_NUM_THREADS=4
    restart: unless-stopped

  whisper-base-multi:
    image: fedirz/faster-whisper-server:latest-cpu
    ports: ["${WHISPER_BASE_MULTI_PORT:-8103}:8000"]
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-base
      - WHISPER__COMPUTE_TYPE=int8
      - OMP_NUM_THREADS=4
    restart: unless-stopped

  whisper-small-multi:
    image: fedirz/faster-whisper-server:latest-cpu
    ports: ["${WHISPER_SMALL_MULTI_PORT:-8104}:8000"]
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-small
      - WHISPER__COMPUTE_TYPE=int8
      - OMP_NUM_THREADS=4
    restart: unless-stopped

  # ─── Piper TTS ───
  tts:
    image: ghcr.io/matatonic/openedai-speech:latest
    ports: ["${TTS_PORT:-8200}:8000"]
    volumes:
      - tts-voices:/app/voices
    restart: unless-stopped

  # ─── Voicebox (optional — enable with `--profile voicebox`) ───
  voicebox:
    profiles: ["voicebox"]
    image: voicebox-voicebox:latest
    build: ./voicebox
    pull_policy: never
    container_name: voicebox
    ports:
      - "127.0.0.1:${VOICEBOX_PORT:-17493}:17493"
    volumes:
      - ./voicebox/output:/app/data/generations
      - voicebox-data:/app/data
      - huggingface-cache:/home/voicebox/.cache/huggingface
    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - OMP_NUM_THREADS=6
      - MKL_NUM_THREADS=6
      - NUMEXPR_NUM_THREADS=6
      - TOKENIZERS_PARALLELISM=false
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 6G
    restart: unless-stopped

  # ─── Backend (FastAPI; uses host's system-installed PostgreSQL) ───
  backend:
    build: ./backend
    ports: ["${BACKEND_PORT:-8000}:8000"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@${POSTGRES_HOST:-host.docker.internal}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-voiceagent}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - FERNET_KEY=${FERNET_KEY:-***REMOVED***}
      - INTERNAL_AGENT_SECRET=${INTERNAL_AGENT_SECRET:-dev-internal-agent-secret-change-in-production}
      # Internal URL used by the backend itself to mint tokens / connect.
      - LIVEKIT_URL=ws://livekit-server:7880
      # Public URL handed back to the browser; defaults to the host port mapped above.
      - LIVEKIT_PUBLIC_URL=${LIVEKIT_PUBLIC_URL:-ws://localhost:${LIVEKIT_PORT:-7880}}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      - VOICEBOX_URL=http://voicebox:17493
      - OLLAMA_URL=http://host.docker.internal:11434
      - PIPER_URL=http://tts:8000/v1
      - TTS_BASE_URL=http://tts:8000/v1
      - WHISPER_TINY_URL=http://whisper-tiny:8000/v1
      - WHISPER_BASE_URL=http://whisper-base:8000/v1
      - WHISPER_SMALL_URL=http://whisper-small:8000/v1
      - WHISPER_BASE_MULTI_URL=http://whisper-base-multi:8000/v1
      - WHISPER_SMALL_MULTI_URL=http://whisper-small-multi:8000/v1
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-***REMOVED***}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-***REMOVED***}
      - HF_HOME=/root/.cache/huggingface
    env_file:
      - path: .env
        required: false
    volumes:
      - livekit-hf-cache:/root/.cache/huggingface
      - quality-data:/data
    depends_on:
      livekit-server:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── Frontend (React/Vite → nginx) ───
  frontend:
    build: ./frontend
    ports: ["${FRONTEND_PORT:-3000}:80"]
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Agent worker ───
  agent:
    build: ./backend
    command: uv run python agent.py start
    environment:
      - LIVEKIT_URL=ws://livekit-server:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-secret}
      # Server-to-server channel for fetching per-room API keys from the
      # backend so they never travel through the browser/JWT.
      - BACKEND_INTERNAL_URL=http://backend:8000
      - INTERNAL_AGENT_SECRET=${INTERNAL_AGENT_SECRET:-dev-internal-agent-secret-change-in-production}
      - OLLAMA_URL=http://host.docker.internal:11434
      - VOICEBOX_URL=http://voicebox:17493
      - TTS_BASE_URL=http://tts:8000/v1
      - WHISPER_TINY_URL=http://whisper-tiny:8000/v1
      - WHISPER_BASE_URL=http://whisper-base:8000/v1
      - WHISPER_SMALL_URL=http://whisper-small:8000/v1
      - WHISPER_BASE_MULTI_URL=http://whisper-base-multi:8000/v1
      - WHISPER_SMALL_MULTI_URL=http://whisper-small-multi:8000/v1
      - HF_HOME=/root/.cache/huggingface
    env_file:
      - path: .env
        required: false
    volumes:
      - livekit-hf-cache:/root/.cache/huggingface
    depends_on:
      - livekit-server
      - whisper-base
      - tts
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  tts-voices:
  voicebox-data:
  huggingface-cache:
  livekit-hf-cache:
  quality-data:
