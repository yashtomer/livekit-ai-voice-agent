[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "livekit-ai-voice-agent"
version = "0.1.0"
description = "AI Voice Agent powered by LiveKit and OpenAI"
requires-python = ">=3.10,<3.15"
dependencies = [
    "livekit-agents[openai,silero,turn-detector,anthropic]~=1.3",
    "python-dotenv>=1.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]
